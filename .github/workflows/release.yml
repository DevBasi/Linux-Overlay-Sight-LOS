name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 librsvg2-bin desktop-file-utils

      - name: Validate .desktop file
        run: desktop-file-validate packaging/linux-overlay-sight.desktop

      - name: Build AppImage
        run: bash packaging/appimage/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: dist/*.AppImage

  release:
    name: Publish GitHub Release
    needs: build-appimage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: appimage
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.AppImage
          generate_release_notes: true
          fail_on_unmatched_files: true
