name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FUSE (for AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 librsvg2-bin desktop-file-utils

      - name: Validate .desktop file
        run: desktop-file-validate packaging/linux-overlay-sight.desktop

      - name: Build AppImage
        run: bash packaging/appimage/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: dist/*.AppImage

  build-wheel:
    name: Build wheel / sdist
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: [build-appimage, build-wheel]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: appimage
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheel
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/linux-overlay-sight
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
